<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2e7d32" />
    <link rel="manifest" href="/manifest.json" />
    <title>Dashboard - GeoGiardini</title>
    <link rel="icon" type="image/png" href="/icons/logo.png" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #81c784 0%, #2e7d32 100%);
        color: #1b5e20;
      }
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1rem 4rem;
      }
      .card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 18px;
        padding: 1.5rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin-top: 0;
        color: #2e7d32;
      }
      .card p {
        margin: 0.75rem 0 0;
        line-height: 1.6;
      }
      .action-link {
        display: inline-block;
        margin-top: 1rem;
        color: #2e7d32;
        font-weight: 700;
        text-decoration: none;
      }
      .version-label {
        margin-top: 1rem;
        color: #33691e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Dashboard</h1>
        <p>
          Accesso completato. Questa è una dashboard base per utenti
          autenticati.
        </p>
        <p>
          Se sei Angelo con credenziali amministrative, verrai reindirizzato
          automaticamente alla dashboard admin.
        </p>
        <p class="version-label" id="versionLabel">v009</p>
        <a class="action-link" href="/login.html">Esci</a>
      </div>
    </div>
    <script>
      async function fetchVersion() {
        try {
          const response = await fetch(`/version.txt?cacheBust=${Date.now()}`);
          if (response.ok) {
            const version = (await response.text()).trim();
            document.title = `Dashboard - GeoGiardini ${version}`;
            document.getElementById("versionLabel").textContent = version;
          }
        } catch (error) {
          console.error("Errore nel recupero della versione:", error);
        }
      }
      fetchVersion();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch((error) => {
              console.error("Service worker registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>
