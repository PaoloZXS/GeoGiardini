<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2e7d32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="GeoGiardini" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/leaf-192.png" />
    <title>Pannello Amministratore - GeoGiardini</title>
    <link rel="icon" type="image/png" href="/icons/logo.png" />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #81c784 0%, #2e7d32 100%);
        color: #1b5e20;
      }
      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }
      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .dashboard-title {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin: 0;
        font-size: clamp(1.75rem, 2.2vw, 2.5rem);
        letter-spacing: 0.02em;
        color: #fff;
      }
      .dashboard-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .dashboard-icon img {
        width: 20px;
        height: 20px;
      }
      .top-bar .actions {
        display: flex;
        gap: 0.75rem;
      }
      .top-bar .actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.85rem 1.2rem;
        background: #7b241c;
        color: #fff;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 700;
        transition:
          transform 0.2s ease,
          background-color 0.2s ease;
      }
      .top-bar .actions a:hover {
        transform: translateY(-1px);
        background-color: #631712;
      }
      .diamond-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.9rem;
        margin-top: 1.75rem;
      }
      .diamond-card {
        position: relative;
        aspect-ratio: 1 / 1;
        min-height: 140px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 22px;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .diamond-card::before {
        content: "";
        position: absolute;
        inset: 0;
        transform: rotate(45deg);
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 255, 255, 0.96),
            transparent 35%
          ),
          linear-gradient(
            135deg,
            rgba(129, 199, 132, 0.2),
            rgba(46, 125, 50, 0.1)
          );
      }
      .diamond-content {
        position: relative;
        width: 88%;
        height: 88%;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 0.5rem;
      }
      .diamond-content h3 {
        margin: 0;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #1b5e20;
      }
      .diamond-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.16);
      }
      @media (max-width: 900px) {
        .diamond-content h3 {
          font-size: 0.95rem;
        }
        .diamond-content p {
          font-size: 0.88rem;
        }
      }
      @media (max-width: 640px) {
        .page {
          padding: 1rem;
        }
        .diamond-card {
          min-height: 120px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top-bar">
        <div>
          <h1 class="dashboard-title">
            <span class="dashboard-icon"
              ><img src="/icons/logo.png" alt="Icona"
            /></span>
            Pannello Amministratore
          </h1>
        </div>
        <div class="actions">
          <a href="#" id="logoutLink">Logout</a>
        </div>
      </div>
      <div class="diamond-grid">
        <div class="diamond-card">
          <div class="diamond-content">
            <h3>Giardinieri</h3>
          </div>
        </div>
        <div class="diamond-card">
          <div class="diamond-content">
            <h3>Clienti</h3>
          </div>
        </div>
        <div class="diamond-card">
          <div class="diamond-content">
            <h3>Lavori</h3>
          </div>
        </div>
        <div class="diamond-card">
          <div class="diamond-content">
            <h3>Messaggi</h3>
          </div>
        </div>
        <div class="diamond-card">
          <div class="diamond-content">
            <h3>Foto</h3>
          </div>
        </div>
      </div>
    </div>
    <script>
      function initPage() {
        const logoutLink = document.getElementById("logoutLink");
        if (logoutLink) {
          logoutLink.addEventListener("click", (event) => {
            event.preventDefault();
            window.location.replace("/login.html");
          });
        }
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch((error) => {
              console.error("Service worker registration failed:", error);
            });
        });
      }
      initPage();
    </script>
  </body>
</html>
