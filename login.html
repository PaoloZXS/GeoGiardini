<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - GeoGiardini</title>
    <link rel="stylesheet" href="global.css" />
    <style>
      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(to bottom, #81c784, #2e7d32);
        color: #1b5e20;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-attachment: fixed;
      }
      .login-container {
        background: rgba(255, 255, 255, 0.9);
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 90%;
        max-width: 400px;
      }
      .login-container h1 {
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
        color: #2e7d32;
      }
      .login-container input {
        width: 100%;
        padding: 0.75rem;
        margin-bottom: 1rem;
        border: 1px solid #81c784;
        border-radius: 8px;
        font-size: 1rem;
      }
      .login-container button {
        background-color: #2e7d32;
        color: #ffffff;
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.3s;
      }
      .login-container button:hover {
        background-color: #1b5e20;
      }
      .login-container .icon {
        margin-bottom: 1rem;
      }
      .login-container p {
        font-size: 0.9rem;
        color: #ff0000;
      }
      @media (min-width: 768px) {
        .login-container {
          padding: 3rem;
        }
        .login-container h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <img src="icons/leaf-192.png" alt="GeoGiardini" class="icon" width="64" />
      <h1>Benvenuto su GeoGiardini</h1>
      <form id="loginForm">
        <input
          type="text"
          id="username"
          placeholder="Inserisci il tuo username"
          required
        />
        <input
          type="password"
          id="code"
          placeholder="Inserisci il tuo codice"
          required
        />
        <button type="submit">Accedi</button>
      </form>
      <p id="errorMessage" style="display: none">
        Credenziali non valide. Riprova.
      </p>
    </div>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const username = document.getElementById("username").value;
          const code = document.getElementById("code").value;

          const response = await fetch("/api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, code })
          });

          if (response.ok) {
            const result = await response.json();
            if (result.success) {
              window.location.href = "/dashboard.html";
            } else {
              document.getElementById("errorMessage").style.display = "block";
            }
          } else {
            document.getElementById("errorMessage").style.display = "block";
          }
        });
    </script>
  </body>
</html>
