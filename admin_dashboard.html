<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2e7d32" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="GeoGiardini" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/leaf-192.png" />
    <title>Pannello Amministratore - GeoGiardini</title>
    <link rel="icon" type="image/png" href="/icons/logo.png" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: linear-gradient(180deg, #81c784 0%, #2e7d32 100%);
        color: #1b5e20;
      }
      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1rem 0.85rem 0;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .top-block,
      .content-block,
      .leaf-block,
      .footer-block {
        width: 100%;
      }
      .content-block {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow-y: auto;
        gap: 1rem;
      }
      .leaf-block {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 1rem 0;
        min-height: 0;
      }
      .footer-block {
        flex-shrink: 0;
        padding-bottom: 0.5rem;
      }
      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        background: #1d5a1f;
        padding: 0.9rem 1rem;
        border-radius: 20px;
      }
      .dashboard-title {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin: 0;
        font-size: clamp(1.75rem, 2.2vw, 2.5rem);
        letter-spacing: 0.02em;
        color: #fff;
        font-weight: 400;
      }
      .dashboard-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .dashboard-icon img {
        width: 20px;
        height: 20px;
      }
      .top-bar .actions {
        display: flex;
        gap: 0.75rem;
      }
      .top-bar .actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.85rem 1.2rem;
        background: #7b241c;
        color: #fff;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 700;
        transition:
          transform 0.2s ease,
          background-color 0.2s ease;
      }
      .top-bar .actions a:hover {
        transform: translateY(-1px);
        background-color: #631712;
      }
      .dashboard-footer {
        padding: 0.75rem 1rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        background: linear-gradient(
          180deg,
          rgba(129, 199, 132, 0),
          rgba(46, 125, 50, 0.04)
        );
      }
      .footer-icon {
        width: 110px;
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .footer-icon img {
        width: 100%;
        height: auto;
        display: block;
      }
      .dashboard-separator {
        height: 1px;
        background: rgba(255, 255, 255, 0.35);
        width: 100%;
      }
      .logout-bottom {
        width: 100%;
        max-width: 320px;
        justify-self: center;
        margin-top: 1rem;
        padding: 0.85rem 1.2rem;
        border: none;
        border-radius: 999px;
        background: #7b241c;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background-color 0.2s ease;
      }
      .logout-bottom:hover {
        transform: translateY(-1px);
        background-color: #631712;
      }
      .footer-note {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.9rem;
        text-align: center;
      }
      .app-version {
        margin: 0;
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.85rem;
        text-align: center;
      }
      .diamond-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        justify-content: center;
        align-content: start;
        gap: 0.45rem 0.65rem;
        margin-top: 1rem;
      }
      .diamond-card {
        width: 100%;
        max-width: 140px;
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        border: 2px solid rgba(46, 125, 50, 0.35);
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .diamond-content {
        width: 78%;
        display: grid;
        place-items: center;
        gap: 0.25rem;
        text-align: center;
        padding: 0.35rem;
      }
      .diamond-icon {
        font-size: 1.2rem;
        line-height: 1;
      }
      .diamond-content h3 {
        margin: 0;
        font-size: 0.88rem;
        letter-spacing: 0.08em;
        color: #000000;
        font-weight: 700;
      }
      .diamond-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.15);
      }
      @media (max-width: 900px) {
        .diamond-content h3 {
          font-size: 0.95rem;
        }
        .diamond-content p {
          font-size: 0.88rem;
        }
      }
      @media (max-width: 640px) {
        .page {
          padding: 0.55rem 0.6rem 0.75rem;
        }
        .dashboard-title {
          font-size: 1.2rem;
        }
        .diamond-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 0.14rem 0.25rem;
          margin-top: 1.8rem;
          justify-items: center;
        }
        .diamond-grid > .diamond-card:nth-child(4) {
          grid-column: 1;
          transform: translateX(50%);
        }
        .diamond-grid > .diamond-card:nth-child(5) {
          grid-column: 3;
          transform: translateX(-50%);
        }
        .diamond-card {
          max-width: 92px;
        }
        .diamond-content {
          width: 70%;
          padding: 0.2rem;
        }
        .diamond-icon {
          font-size: 0.95rem;
        }
        .diamond-content h3 {
          font-size: 0.72rem;
        }
        .dashboard-footer {
          gap: 0.35rem;
          padding-top: 0.55rem;
          padding-bottom: 0.55rem;
        }
        .logout-bottom {
          max-width: 100%;
          padding: 0.65rem 0.9rem;
        }
        .diamond-card {
          max-width: 92px;
        }
        .footer-icon {
          width: 76px;
          height: 76px;
        }
        .leaf-block {
          padding: 0.4rem 0;
        }
        .footer-note,
        .app-version {
          font-size: 0.78rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="content-block">
        <div class="top-block">
          <div class="top-bar">
            <div>
              <h1 class="dashboard-title">
                <span id="dashboardTitleText">Pannello Amministratore</span>
              </h1>
            </div>
          </div>
          <div class="diamond-grid">
            <div class="diamond-card">
              <div class="diamond-content">
                <div class="diamond-icon">👩‍🌾</div>
                <h3>Giardinieri</h3>
              </div>
            </div>
            <div class="diamond-card">
              <div class="diamond-content">
                <div class="diamond-icon">👥</div>
                <h3>Clienti</h3>
              </div>
            </div>
            <div class="diamond-card">
              <div class="diamond-content">
                <div class="diamond-icon">🛠️</div>
                <h3>Lavori</h3>
              </div>
            </div>
            <div class="diamond-card">
              <div class="diamond-content">
                <div class="diamond-icon">💬</div>
                <h3>Messaggi</h3>
              </div>
            </div>
            <div class="diamond-card">
              <div class="diamond-content">
                <div class="diamond-icon">📸</div>
                <h3>Foto</h3>
              </div>
            </div>
          </div>
        </div>
        <div>
          <div class="leaf-block">
            <div class="footer-icon">
              <img src="/icons/leaf-512.png" alt="Icona Foglia" />
            </div>
          </div>
        </div>
      </div>
      <div class="footer-block">
        <div class="dashboard-footer">
          <button class="logout-bottom" id="logoutLink">Logout</button>
          <div class="dashboard-separator"></div>
          <p class="footer-note">Powered Spectrum Italia 2026</p>
          <p class="app-version" id="appVersion">Versione in caricamento...</p>
        </div>
      </div>
    </div>
    <script>
      function initPage() {
        const logoutLink = document.getElementById("logoutLink");
        if (logoutLink) {
          logoutLink.addEventListener("click", (event) => {
            event.preventDefault();
            window.location.replace("/login.html");
          });
        }
      }

      function setDashboardGreeting() {
        const titleText = document.getElementById("dashboardTitleText");
        const username = localStorage.getItem("geogiardini_username");
        const role = localStorage.getItem("geogiardini_role");
        if (titleText) {
          if (username && role === "admin") {
            titleText.textContent = `Ciao ${username}`;
          } else if (username) {
            titleText.textContent = `Ciao ${username}`;
          } else {
            titleText.textContent = "Pannello Amministratore";
          }
        }
      }

      async function fetchAppVersion() {
        const versionLabel = document.getElementById("appVersion");
        if (!versionLabel) return;

        try {
          const response = await fetch(`/version.txt?cacheBust=${Date.now()}`);
          if (!response.ok) throw new Error("Version file not found");
          const version = (await response.text()).trim();
          versionLabel.textContent = `Versione ${version}`;
        } catch (error) {
          console.error("Errore nel recupero della versione:", error);
          versionLabel.textContent = "Versione non disponibile";
        }
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch((error) => {
              console.error("Service worker registration failed:", error);
            });
        });
      }
      setDashboardGreeting();
      fetchAppVersion();
      initPage();
    </script>
  </body>
</html>
